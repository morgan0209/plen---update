<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Real-Time Kita</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F2EA;
            --surface: #FFFFFF;
            --surface-soft: #FBF9F4;
            --ink: #29271F;
            --ink-soft: #736C5E;
            --ink-faint: #A39C8C;
            --line: #E7E1D0;
            --line-soft: #F0EBDD;
            --brand: #35695C;
            --brand-dark: #244A40;
            --coral: #E2673F;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-card: 0 1px 2px rgba(41,39,31,0.04), 0 6px 16px rgba(41,39,31,0.06);
            --shadow-pop: 0 12px 32px rgba(41,39,31,0.16);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 100% 0%, rgba(53,105,92,0.06) 0%, transparent 45%),
                radial-gradient(circle at 0% 100%, rgba(226,103,63,0.05) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--ink);
            padding: 0 16px 60px;
        }

        /* ===== Header ===== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 5;
            background: var(--bg);
            padding: 22px 0 14px;
            margin-bottom: 4px;
        }
        .top-bar::after {
            content: '';
            position: absolute;
            left: -16px; right: -16px; bottom: 0;
            height: 14px;
            background: linear-gradient(var(--bg), transparent);
            pointer-events: none;
        }
        h1 {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 600;
            font-size: 30px;
            letter-spacing: -0.01em;
            color: var(--ink);
            margin-bottom: 3px;
        }
        .top-bar .subjudul {
            font-size: 13px;
            color: var(--ink-soft);
        }
        .top-bar .subjudul .titik-live {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--brand);
            margin-right: 6px;
            box-shadow: 0 0 0 3px rgba(53,105,92,0.15);
        }

        /* ===== Bar pencarian & filter ===== */
        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 16px 0 12px;
        }
        .search-wrap {
            position: relative;
            flex: 1 1 220px;
        }
        .search-wrap .ikon-cari {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.55;
            pointer-events: none;
        }
        #searchInput {
            width: 100%;
            padding: 11px 14px 11px 36px;
        }
        #searchInput, #filterKategori {
            border: 1.5px solid var(--line);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            background: var(--surface);
            color: var(--ink);
        }
        #filterKategori {
            padding: 11px 14px;
            flex: 0 0 auto;
            max-width: 180px;
        }
        #searchInput:focus, #filterKategori:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(53,105,92,0.14);
        }
        #searchInput::placeholder { color: var(--ink-faint); }

        #btnTambahKategori {
            flex: 0 0 auto;
            background: var(--brand);
            color: #fff;
            border: none;
            padding: 11px 18px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, transform 0.1s;
        }
        #btnTambahKategori:hover { background: var(--brand-dark); }
        #btnTambahKategori:active { transform: scale(0.97); }

        /* ===== Filter A-Z ===== */
        .az-filter {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 2px 2px 10px;
            margin-bottom: 18px;
            scrollbar-width: none;
        }
        .az-filter::-webkit-scrollbar { display: none; }
        .az-btn {
            flex: 0 0 auto;
            border: 1.5px solid var(--line);
            background: var(--surface);
            color: var(--ink-soft);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 12px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .az-btn:first-child { width: auto; border-radius: 15px; padding: 0 14px; }
        .az-btn.aktif { background: var(--ink); border-color: var(--ink); color: #fff; }
        .az-btn:hover:not(.aktif) { border-color: var(--brand); color: var(--brand); }

        /* ===== Grid kategori ===== */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 16px;
        }

        .kategori {
            --accent: var(--brand);
            --accent-soft: rgba(53,105,92,0.12);
            background: var(--surface);
            border: 1px solid var(--line-soft);
            border-top: 3px solid var(--accent);
            padding: 16px 16px 14px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            transition: box-shadow 0.25s, transform 0.25s;
            animation: naik 0.35s ease backwards;
        }
        .kategori:hover { box-shadow: 0 4px 20px rgba(41,39,31,0.09); }
        .kategori.highlight {
            box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-card);
        }
        @keyframes naik {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .kategori-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 10px;
        }
        .kategori-title {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .kategori-icon {
            flex: 0 0 auto;
            width: 32px; height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9px;
            background: var(--accent-soft);
            font-size: 15px;
        }
        .kategori h3 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 15.5px;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-hapus-kategori {
            flex: 0 0 auto;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            opacity: 0;
            padding: 4px;
            line-height: 1;
            border-radius: 6px;
            transition: opacity 0.15s, background 0.15s;
        }
        .kategori:hover .btn-hapus-kategori,
        .kategori:focus-within .btn-hapus-kategori { opacity: 0.4; }
        .btn-hapus-kategori:hover { opacity: 1 !important; background: var(--line-soft); }

        textarea {
            width: 100%;
            height: 128px;
            padding: 10px 4px 4px;
            border: none;
            border-top: 1px solid var(--line-soft);
            resize: none;
            font-size: 14px;
            line-height: 1.55;
            font-family: inherit;
            color: var(--ink);
            background: transparent;
        }
        textarea::placeholder { color: var(--ink-faint); }
        textarea:focus { outline: none; }

        /* ===== Panel hasil pencarian ===== */
        .hasil-pencarian {
            background: var(--surface);
            border: 1px solid var(--line-soft);
            border-radius: var(--radius-lg);
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }
        .hasil-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 16px;
            background: var(--surface-soft);
            font-size: 13px;
            color: var(--ink-soft);
            font-weight: 600;
            border-bottom: 1px solid var(--line-soft);
        }
        #btnTutupHasil {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            color: var(--ink-soft);
            padding: 4px 6px;
            border-radius: 6px;
        }
        #btnTutupHasil:hover { background: var(--line-soft); color: var(--ink); }
        .hasil-item {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 12px 16px;
            border-top: 1px solid var(--line-soft);
            cursor: pointer;
            transition: background 0.12s;
        }
        .hasil-item:first-child { border-top: none; }
        .hasil-item:hover { background: var(--surface-soft); }
        .hasil-badge {
            flex: 0 0 auto;
            font-size: 11.5px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 12px;
            white-space: nowrap;
        }
        .hasil-teks {
            font-size: 14px;
            color: var(--ink);
            word-break: break-word;
        }
        .hasil-kosong {
            padding: 30px 15px;
            text-align: center;
            color: var(--ink-faint);
            font-size: 14px;
        }

        /* ===== Modal tambah kategori ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(41,39,31,0.45);
            backdrop-filter: blur(2px);
            align-items: center;
            justify-content: center;
            padding: 15px;
            z-index: 10;
        }
        .modal-overlay.tampil { display: flex; }
        .modal-box {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 22px;
            width: 100%;
            max-width: 320px;
            box-shadow: var(--shadow-pop);
            animation: naik 0.2s ease;
        }
        .modal-box h2 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 18px;
            color: var(--ink);
            margin-bottom: 4px;
        }
        .modal-box .modal-sub {
            font-size: 12.5px;
            color: var(--ink-soft);
            margin-bottom: 14px;
        }
        .modal-box label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: var(--ink-faint);
            margin-bottom: 5px;
            margin-top: 12px;
        }
        .modal-box input {
            width: 100%;
            padding: 10px 11px;
            border: 1.5px solid var(--line);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            background: var(--surface-soft);
        }
        .modal-box input:focus {
            outline: none;
            border-color: var(--brand);
            background: var(--surface);
        }
        .modal-tombol {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }
        .modal-tombol button {
            flex: 1;
            padding: 11px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: background 0.15s;
        }
        .btn-batal { background: var(--line-soft); color: var(--ink-soft); }
        .btn-batal:hover { background: var(--line); }
        .btn-simpan { background: var(--brand); color: #fff; }
        .btn-simpan:hover { background: var(--brand-dark); }

        @media (max-width: 480px) {
            .search-bar { flex-direction: column; }
            #filterKategori { max-width: none; }
            #btnTambahKategori { width: 100%; }
            h1 { font-size: 26px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .kategori, .modal-box { animation: none; }
            * { transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>Catatan Kita</h1>
        <div class="subjudul"><span class="titik-live"></span>Tersinkron otomatis, real-time</div>
    </div>

    <div class="search-bar">
        <div class="search-wrap">
            <span class="ikon-cari">🔍</span>
            <input type="text" id="searchInput" placeholder="Cari catatan...">
        </div>
        <select id="filterKategori">
            <option value="semua">Semua Kategori</option>
            {% for kat in kategori_list %}
            <option value="{{ kat.id }}">{{ kat.ikon }} {{ kat.nama }}</option>
            {% endfor %}
        </select>
        <button id="btnTambahKategori">+ Kategori</button>
    </div>

    <div class="az-filter" id="azFilter">
        <button class="az-btn aktif" data-huruf="">Semua</button>
        {% for huruf in 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' %}
        <button class="az-btn" data-huruf="{{ huruf }}">{{ huruf }}</button>
        {% endfor %}
    </div>

    <div class="hasil-pencarian" id="hasilPencarian" style="display:none;">
        <div class="hasil-header">
            <span id="jumlahHasil"></span>
            <button id="btnTutupHasil">✕ Tutup</button>
        </div>
        <div id="daftarHasil"></div>
    </div>

    <div class="container" id="containerKategori">
        {% for kat in kategori_list %}
        <div class="kategori" id="card-{{ kat.id }}" data-id="{{ kat.id }}">
            <div class="kategori-header">
                <div class="kategori-title">
                    <span class="kategori-icon">{{ kat.ikon }}</span>
                    <h3>{{ kat.nama }}</h3>
                </div>
                <button class="btn-hapus-kategori" onclick="hapusKategori('{{ kat.id }}')" title="Hapus kategori">🗑️</button>
            </div>
            <textarea id="{{ kat.id }}" placeholder="Belum ada catatan..." onkeyup="kirimUpdate('{{ kat.id }}')">{{ notes[kat.id] }}</textarea>
        </div>
        {% endfor %}
    </div>

    <div class="modal-overlay" id="modalTambah">
        <div class="modal-box">
            <h2>Kategori Baru</h2>
            <div class="modal-sub">Buat ruang catatan baru untuk kalian berdua</div>
            <label for="inputNamaKategori">Nama kategori</label>
            <input type="text" id="inputNamaKategori" placeholder="misal: Resto Jepang" maxlength="60">
            <label for="inputIkonKategori">Ikon (emoji, opsional)</label>
            <input type="text" id="inputIkonKategori" placeholder="📁" maxlength="8">
            <div class="modal-tombol">
                <button class="btn-batal" id="btnBatalTambah">Batal</button>
                <button class="btn-simpan" id="btnSimpanTambah">Tambah</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        // Data catatan & kategori disimpan di memori supaya pencarian tidak perlu tanya server tiap kali
        let dataKonten = {{ notes|tojson }};
        let dataKategori = {{ kategori_list|tojson }};

        // ===== Warna aksen per kategori (konsisten berdasarkan id) =====
        const PALET_AKSEN = ['#E2673F', '#35695C', '#C98A2C', '#5C6FBF', '#A85B84', '#5C8A64', '#3E82A6', '#B15B3F'];

        function warnaAksen(id) {
            let hash = 0;
            for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
            return PALET_AKSEN[Math.abs(hash) % PALET_AKSEN.length];
        }

        function hexKeRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function terapkanAksen(elemen, id) {
            const warna = warnaAksen(id);
            elemen.style.setProperty('--accent', warna);
            elemen.style.setProperty('--accent-soft', hexKeRgba(warna, 0.14));
        }

        document.querySelectorAll('.kategori').forEach(el => terapkanAksen(el, el.dataset.id));

        // ===== Sinkron isi catatan real-time =====
        function kirimUpdate(kategori_id) {
            const kontenText = document.getElementById(kategori_id).value;
            dataKonten[kategori_id] = kontenText;
            socket.emit('edit_kategori', { kategori: kategori_id, konten: kontenText });
            if (pencarianAktif()) jalankanPencarian();
        }

        socket.on('update_layar', function(data) {
            const ta = document.getElementById(data.kategori);
            if (ta) ta.value = data.konten;
            dataKonten[data.kategori] = data.konten;
            if (pencarianAktif()) jalankanPencarian();
        });

        // ===== Escape teks bebas dari user sebelum dimasukkan lewat innerHTML =====
        function escapeHtml(teks) {
            const div = document.createElement('div');
            div.textContent = teks;
            return div.innerHTML;
        }

        // ===== Tambah kategori =====
        const modalTambah = document.getElementById('modalTambah');
        document.getElementById('btnTambahKategori').addEventListener('click', () => {
            modalTambah.classList.add('tampil');
            document.getElementById('inputNamaKategori').focus();
        });
        document.getElementById('btnBatalTambah').addEventListener('click', tutupModalTambah);
        modalTambah.addEventListener('click', (e) => { if (e.target === modalTambah) tutupModalTambah(); });

        function tutupModalTambah() {
            modalTambah.classList.remove('tampil');
            document.getElementById('inputNamaKategori').value = '';
            document.getElementById('inputIkonKategori').value = '';
        }

        document.getElementById('btnSimpanTambah').addEventListener('click', submitTambahKategori);
        document.getElementById('inputNamaKategori').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitTambahKategori();
        });

        function submitTambahKategori() {
            const nama = document.getElementById('inputNamaKategori').value.trim();
            const ikon = document.getElementById('inputIkonKategori').value.trim() || '📁';
            if (!nama) return;
            socket.emit('tambah_kategori', { nama, ikon });
            tutupModalTambah();
        }

        socket.on('kategori_ditambahkan', function(kat) {
            if (dataKategori.find(k => k.id === kat.id)) return;
            dataKategori.push(kat);
            dataKonten[kat.id] = '';
            tambahKartuKeDOM(kat);
            tambahOpsiDropdown(kat);
        });

        function tambahKartuKeDOM(kat) {
            const kartu = document.createElement('div');
            kartu.className = 'kategori';
            kartu.id = 'card-' + kat.id;
            kartu.dataset.id = kat.id;

            const header = document.createElement('div');
            header.className = 'kategori-header';

            const titleWrap = document.createElement('div');
            titleWrap.className = 'kategori-title';

            const ikonSpan = document.createElement('span');
            ikonSpan.className = 'kategori-icon';
            ikonSpan.textContent = kat.ikon;

            const judul = document.createElement('h3');
            judul.textContent = kat.nama;

            titleWrap.appendChild(ikonSpan);
            titleWrap.appendChild(judul);

            const btnHapus = document.createElement('button');
            btnHapus.className = 'btn-hapus-kategori';
            btnHapus.title = 'Hapus kategori';
            btnHapus.textContent = '🗑️';
            btnHapus.onclick = () => hapusKategori(kat.id);

            header.appendChild(titleWrap);
            header.appendChild(btnHapus);

            const textarea = document.createElement('textarea');
            textarea.id = kat.id;
            textarea.placeholder = 'Belum ada catatan...';
            textarea.value = '';
            textarea.addEventListener('keyup', () => kirimUpdate(kat.id));

            kartu.appendChild(header);
            kartu.appendChild(textarea);
            document.getElementById('containerKategori').appendChild(kartu);
            terapkanAksen(kartu, kat.id);
        }

        function tambahOpsiDropdown(kat) {
            const opsi = document.createElement('option');
            opsi.value = kat.id;
            opsi.textContent = kat.ikon + ' ' + kat.nama;
            document.getElementById('filterKategori').appendChild(opsi);
        }

        // ===== Hapus kategori =====
        function hapusKategori(id) {
            if (!confirm('Yakin ingin menghapus kategori ini beserta isinya?')) return;
            socket.emit('hapus_kategori', { id });
        }

        socket.on('kategori_dihapus', function(data) {
            dataKategori = dataKategori.filter(k => k.id !== data.id);
            delete dataKonten[data.id];
            const kartu = document.getElementById('card-' + data.id);
            if (kartu) kartu.remove();
            const opsi = document.querySelector('#filterKategori option[value="' + data.id + '"]');
            if (opsi) opsi.remove();
            if (pencarianAktif()) jalankanPencarian();
        });

        // ===== Pencarian & filter (kategori + inisial huruf + teks bebas) =====
        const inputSearch = document.getElementById('searchInput');
        const selectKategori = document.getElementById('filterKategori');
        let hurufAktif = '';

        inputSearch.addEventListener('input', jalankanPencarian);
        selectKategori.addEventListener('change', jalankanPencarian);

        document.querySelectorAll('.az-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.az-btn').forEach(b => b.classList.remove('aktif'));
                btn.classList.add('aktif');
                hurufAktif = btn.dataset.huruf;
                jalankanPencarian();
            });
        });

        document.getElementById('btnTutupHasil').addEventListener('click', resetPencarian);

        function resetPencarian() {
            inputSearch.value = '';
            selectKategori.value = 'semua';
            hurufAktif = '';
            document.querySelectorAll('.az-btn').forEach(b => b.classList.remove('aktif'));
            document.querySelector('.az-btn[data-huruf=""]').classList.add('aktif');
            tampilkanGridNormal();
        }

        function pencarianAktif() {
            return inputSearch.value.trim() !== '' || selectKategori.value !== 'semua' || hurufAktif !== '';
        }

        function tampilkanGridNormal() {
            document.getElementById('hasilPencarian').style.display = 'none';
            document.getElementById('containerKategori').style.display = 'grid';
        }

        function jalankanPencarian() {
            if (!pencarianAktif()) {
                tampilkanGridNormal();
                return;
            }

            const q = inputSearch.value.trim().toLowerCase();
            const katFilter = selectKategori.value;
            const hasil = [];

            dataKategori.forEach(kat => {
                if (katFilter !== 'semua' && kat.id !== katFilter) return;
                const baris = (dataKonten[kat.id] || '').split('\n');
                baris.forEach(b => {
                    const teks = b.trim();
                    if (!teks) return;
                    if (hurufAktif && teks[0].toUpperCase() !== hurufAktif) return;
                    if (q && !teks.toLowerCase().includes(q)) return;
                    hasil.push({ kategori: kat, teks });
                });
            });

            tampilkanHasil(hasil);
        }

        function tampilkanHasil(hasil) {
            document.getElementById('containerKategori').style.display = 'none';
            document.getElementById('hasilPencarian').style.display = 'block';
            document.getElementById('jumlahHasil').textContent = hasil.length + ' hasil ditemukan';

            const daftar = document.getElementById('daftarHasil');
            if (hasil.length === 0) {
                daftar.innerHTML = '<div class="hasil-kosong">Tidak ada catatan yang cocok 🤷</div>';
                return;
            }

            daftar.innerHTML = hasil.map(h => {
                const warna = warnaAksen(h.kategori.id);
                const styleBadge = `background:${hexKeRgba(warna, 0.14)};color:${warna};`;
                return `
                <div class="hasil-item" onclick="lompatKeKategori('${h.kategori.id}')">
                    <span class="hasil-badge" style="${styleBadge}">${escapeHtml(h.kategori.ikon + ' ' + h.kategori.nama)}</span>
                    <span class="hasil-teks">${escapeHtml(h.teks)}</span>
                </div>
            `;
            }).join('');
        }

        function lompatKeKategori(id) {
            resetPencarian();
            const kartu = document.getElementById('card-' + id);
            if (!kartu) return;
            kartu.scrollIntoView({ behavior: 'smooth', block: 'center' });
            kartu.classList.add('highlight');
            setTimeout(() => kartu.classList.remove('highlight'), 1500);
        }
    </script>
</body>
</html>
